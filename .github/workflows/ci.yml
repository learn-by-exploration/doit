name: CI

# Streak is Android-only. The CI runs the 3-gate (format, analyze,
# test) on every PR and push to main. A second job builds a debug
# APK as a smoke check. A third job builds a release AAB on main
# only, gated on the four ANDROID_* GitHub Secrets being set.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.0'

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. The 3-gate. Same three commands CLAUDE.md mandates,
  #    in the same order. Must stay green on every PR.
  # ─────────────────────────────────────────────────────────
  quality:
    name: 3-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      # SYS-026: the app shall not perform any network call
      # with user data. The CI grep enforces this contract at
      # the source level — any `import 'package:http'` or
      # `Uri.http(s)` in production code is a defect (see
      # `.claude/rules/lib-services.md` "No network calls").
      #
      # The grep covers `lib/` and `android/app/src/main/`
      # (Kotlin). The `tool/` directory is excluded — it holds
      # design-time scripts (e.g.,
      # `tool/regen_launcher_icons.py`) which may use any
      # network-free tooling. `test/` is excluded — the
      # `flutter_test` framework and `package:http`'s
      # `MockClient` are explicitly whitelisted for test
      # scaffolding (the dev-only test harness that SYS-026
      # calls out). `dart_tool/` and `build/` are excluded —
      # generated code from third-party packages may include
      # `package:http` transitively and that is fine.
      #
      # The grep is "must produce zero hits". A non-empty hit
      # count fails the CI job.
      - name: Reject network calls in production code (SYS-026)
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          hits=$(grep -RInE \
            --exclude-dir=build \
            --exclude-dir=dart_tool \
            --exclude-dir=.dart_tool \
            --exclude-dir=tool \
            --exclude-dir=test \
            --exclude-dir=.git \
            -e "import 'package:http" \
            -e "Uri\.https?\(" \
            -e "HttpClient\(\)" \
            -e "dart:io" \
            lib/ android/app/src/main/ 2>&1 || true)
          # `dart:io` import alone is not a defect (we use it
          # for `dart:io.File`, `dart:io.Platform`,
          # `dart:io.Process`, etc.) — exclude matches that
          # are NOT `dart:io.HttpClient` / `dart:io.HttpServer`.
          # Filter out the `dart:io` line unless it's followed
          # by `Http*` on the same import statement. Since
          # grep returns the matching line, a line containing
          # only `import 'dart:io'` (no `Http`) is OK; the
          # line `import 'dart:io' as io;` and use of `io.Http*`
          # would NOT be caught here and is caught by the
          # `HttpClient()` regex above.
          net_hits=$(echo "$hits" | grep -v "^$" | grep -vE \
            "^[^:]+:[^:]*:[[:space:]]*import 'dart:io'" || true)
          if [ -n "$net_hits" ]; then
            echo "::error title=SYS-026 violation::"
            echo "Found forbidden network usage in production code:"
            echo "$net_hits"
            exit 1
          fi
          echo "SYS-026 grep clean — no http/Uri.https in production code."

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────
  # 2. Build a debug APK. Cheap sanity check that the
  #    Android toolchain still wires up.
  # ─────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # 3. Build a release AAB (main branch only).
  #    Requires GitHub Secrets:
  #      ANDROID_KEYSTORE_BASE64  — base64 of upload-keystore.jks
  #      ANDROID_KEY_ALIAS        — upload
  #      ANDROID_KEY_PASSWORD     — key password
  #      ANDROID_STORE_PASSWORD   — store password
  #    The four secrets are validated up front; a missing secret
  #    skips the job with a clear error rather than producing a
  #    half-built artifact.
  # ─────────────────────────────────────────────────────────
  build-android-release:
    name: Build Android Release (AAB)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          missing=0
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_STORE_PASSWORD \
            ANDROID_KEY_PASSWORD \
            ANDROID_KEY_ALIAS
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::notice::Release build skipped — set the four ANDROID_* secrets to enable."
            exit 0
          fi

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode \
            > android/upload-keystore.jks

      - name: Create key.properties
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
