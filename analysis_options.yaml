include: package:flutter_lints/flutter.yaml

# 18-lint set inherited from board_box (see
# common_games/board_box/analysis_options.yaml). The list is the
# minimum: anything that fights the sealed-class hierarchy or
# 3-gate workflow in Streak gets added in a follow-up PR, never
# inlined here without an ADR.

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    - avoid_print
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_locals
    - prefer_single_quotes
    - use_key_in_widget_constructors
    - always_use_package_imports
    - prefer_is_empty
    - prefer_is_not_empty
    - unnecessary_this
    - avoid_unnecessary_containers
    - sized_box_for_whitespace
    - use_colored_box
    - sort_child_properties_last
    - unawaited_futures
    - unnecessary_lambdas
    - avoid_redundant_argument_values
