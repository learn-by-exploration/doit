name: doit
description: "do it: a slightly stubborn habit coach for Android."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

# do it is a personal-use Android habit app. iOS is v0.2+ scope. The
# version and build number are overridden by `flutter build` flags.
# v1.0 is the Routines + Japan silent-mode + Do rename milestone
# (Phases A–F closed across 14 commits from `373913c` v1.0a.3 to
# `ff56021` v1.0f.2; see docs/v_model/v1_0_release_baseline.md).
version: 1.0.0+7

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # v0.1 baseline dependencies (see
  # docs/v_model/architecture_options.md § Baseline Tech Stack).
  # Re-run `flutter pub outdated` before bumping any of these.
  flutter_local_notifications: ^17.2.4
  android_alarm_manager_plus: ^4.0.4
  # workmanager 0.5.x uses the removed v1 Flutter plugin embedding
  # (io.flutter.plugin.common.PluginRegistry.PluginRegistrantCallback)
  # and fails to compile against Flutter 3.44. Pin to 0.6.0+ which
  # migrated to the v2 embedding. See pub.dev/packages/workmanager
  # changelog for the migration.
  workmanager: ^0.6.0
  permission_handler: ^11.3.1
  # The platform-interface package is re-exported by
  # `permission_handler` for the user-facing types
  # (`Permission`, `PermissionStatus`, ...) but NOT for the
  # `PermissionHandlerPlatform` interface or the
  # `PermissionStatusValue` extension that exposes
  # `status.value` (the integer wire format). The v0.5b
  # service + tests import these directly; pinning the
  # platform-interface version avoids the
  # `depend_on_referenced_packages` lint.
  permission_handler_platform_interface: ^4.3.0
  drift: ^2.20.2
  flutter_contacts: ^1.1.9+2
  # DB file lives under the OS app-support directory; the path
  # join itself is a small stdlib-style helper.
  path: ^1.9.0
  path_provider: ^2.1.4

  # `meta` is transitively available via flutter, but the
  # `depend_on_referenced_packages` lint flags `@immutable` etc.
  # in lib/habits, lib/missions, lib/people. Pinning it makes
  # the lint go away without an extra layer of indirection.
  meta: ^1.15.0

  # State management for the UI layer. Per
  # .claude/rules/lib-screens.md: "Use Provider (or ChangeNotifier
  # directly)". We use provider for the standard Consumer /
  # context.watch wiring.
  provider: ^6.1.2

  # Backup / restore: lets the user pick a JSON backup file
  # via Android's Storage Access Framework. No runtime
  # permission required.
  file_picker: ^8.1.2

  # Persisted user-tweakable settings (theme mode, first-launch
  # flag). The v0.4a.3 firstLaunch persisted flag is the first
  # feature that uses this; v0.1 stored settings in memory only.
  shared_preferences: ^2.3.4

  # Backup encryption (v0.4c.1 / SYS-061). Provides PBKDF2-HMAC-SHA256
  # and AES-256-GCM for the v2 backup envelope. The plain-JSON v1
  # path stays supported for back-compat reads; the v2 path requires
  # a user-supplied passphrase and derives a 32-byte key via
  # PBKDF2 with ≥ 100,000 iterations + 16-byte random salt.
  cryptography: ^2.9.0

  # Geofence position stream (v1.0 / Phase C PR 2 / ADR-021).
  # GeofenceService consumes Geolocator.getPositionStream() and
  # runs Dart-side matching against the registered
  # TriggerLocation set; the matched events are exposed as a
  # broadcast Stream<GeofenceEvent> that RoutineExecutor
  # subscribes to. Geolocator is the only platform dep we add
  # for the geofence layer — see ADR-021 for the library-choice
  # rationale (flutter_geofence is stale; geofence_service
  # overlaps responsibility and forces its own permission
  # model).
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Drift codegen. The first `.drift` file lands in Phase 2; the deps
  # are added now so the scaffold is ready.
  drift_dev: ^2.20.3
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
